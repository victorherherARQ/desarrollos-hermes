global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-monitor'

rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus se autoscraping
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas del host (CPU, RAM, disco, red)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

# LAN scanner (métricas custom que expone el servicio)
  - job_name: 'lan-scanner'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']
