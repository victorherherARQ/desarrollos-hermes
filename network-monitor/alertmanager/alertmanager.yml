global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'webhook'

receivers:
  - name: 'webhook'
    webhook_configs:
      # Vacío por defecto. Para activar Telegram/email/etc, editar este archivo
      # y reiniciar: docker compose restart alertmanager
      - url: 'http://127.0.0.1:5001/disabled'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
