<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitor</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <h1>🖥️ System Monitor</h1>
    <div class="period">
      <label>Período: </label>
      <select id="period">
        <option value="1">1h</option>
        <option value="6">6h</option>
        <option value="24" selected>24h</option>
        <option value="168">7d</option>
      </select>
      <button id="refresh">↻ Actualizar</button>
    </div>
  </header>

  <main>
    <!-- Tarjetas de métricas -->
    <section class="cards" id="cards">
      <div class="card"><div class="card-label">CPU</div><div class="card-value" id="m-cpu">–</div><div class="card-sub" id="m-cpu-sub"></div><canvas class="spark" id="sp-cpu"></canvas></div>
      <div class="card"><div class="card-label">RAM</div><div class="card-value" id="m-ram">–</div><div class="card-sub" id="m-ram-sub"></div><canvas class="spark" id="sp-ram"></canvas></div>
      <div class="card"><div class="card-label">Disco</div><div class="card-value" id="m-disk">–</div><div class="card-sub" id="m-disk-sub"></div><canvas class="spark" id="sp-disk"></canvas></div>
      <div class="card"><div class="card-label">Load</div><div class="card-value" id="m-load">–</div><div class="card-sub" id="m-load-sub"></div><canvas class="spark" id="sp-load"></canvas></div>
      <div class="card"><div class="card-label">🌡️ CPU Temp</div><div class="card-value" id="m-temp">–</div><div class="card-sub" id="m-temp-sub"></div><canvas class="spark" id="sp-temp"></canvas></div>
      <div class="card"><div class="card-label">Red</div><div class="card-value" id="m-net">–</div><div class="card-sub" id="m-net-sub"></div><canvas class="spark" id="sp-net"></canvas></div>
    </section>

    <!-- Gráfica principal -->
    <section class="chart">
      <h2>Histórico <span id="period-label">24h</span></h2>
      <canvas id="bigChart" width="1200" height="320"></canvas>
    </section>

    <!-- Procesos y contenedores -->
    <section class="row">
      <div class="table-wrap">
        <h2>🔝 Top procesos</h2>
        <table id="procs"><thead><tr><th>PID</th><th>Nombre</th><th>Usuario</th><th>CPU %</th><th>RAM MB</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="table-wrap">
        <h2>🐳 Contenedores Docker</h2>
        <table id="conts"><thead><tr><th>Nombre</th><th>CPU %</th><th>RAM MB</th></tr></thead><tbody></tbody></table>
      </div>
    </section>

    <!-- Informe textual -->
    <section class="report">
      <h2>📋 Informe <span id="report-period">24h</span></h2>
      <pre id="report-text">Cargando…</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
