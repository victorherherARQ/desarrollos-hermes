name: system-monitor

services:
  system-monitor:
    build: ./app
    container_name: sm-monitor
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
