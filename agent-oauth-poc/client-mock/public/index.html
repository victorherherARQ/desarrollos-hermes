<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Client Mock · Agente IA PoC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 20px;
      color: #1a2332;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 32px 24px;
    }
    .logo { text-align: center; margin-bottom: 24px; font-size: 2em; }
    h1 { font-size: 1.4em; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #6b7889; font-size: 0.9em; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
    select, input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid #d6dce4;
      border-radius: 6px; font-size: 1em; font-family: inherit;
    }
    .scopes { margin: 16px 0; }
    .scopes label {
      display: flex; align-items: center; padding: 10px; margin-bottom: 4px;
      border: 1px solid #e8ecf1; border-radius: 6px; cursor: pointer; font-weight: normal;
    }
    .scopes input { margin-right: 10px; }
    .scopes .description { color: #6b7889; font-size: 0.85em; margin-left: 10px; }
    button {
      width: 100%; padding: 14px; background: #0066cc; color: white;
      border: none; border-radius: 6px; font-size: 1em; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    button:hover { background: #0052a3; }
    button:disabled { background: #a3b8cc; cursor: not-allowed; }
    .alt-flow {
      margin-top: 16px; text-align: center; padding-top: 16px;
      border-top: 1px solid #e8ecf1;
    }
    .alt-flow a { color: #0066cc; text-decoration: none; font-size: 0.9em; cursor: pointer; }
    .status {
      margin-top: 20px; padding: 12px; border-radius: 6px;
      font-size: 0.9em; display: none;
    }
    .status.show { display: block; }
    .status.ok { background: #e8f5e9; color: #1b5e20; border: 1px solid #a5d6a7; }
    .status.err { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6c2; }
    .status pre { font-size: 0.75em; overflow-x: auto; margin-top: 8px; }
    .tabs {
      display: flex; margin-bottom: 20px; border-bottom: 1px solid #e8ecf1;
    }
    .tab {
      flex: 1; padding: 12px; text-align: center; cursor: pointer;
      color: #6b7889; font-weight: 600; font-size: 0.9em;
      border-bottom: 3px solid transparent;
    }
    .tab.active { color: #0066cc; border-bottom-color: #0066cc; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🤖</div>
    <h1>Cliente Mock</h1>
    <p class="subtitle">Simula el dispositivo del usuario<br>para Auth Code + PKCE y Device Code</p>

    <div class="tabs">
      <div class="tab active" data-tab="authcode">A. Auth Code + PKCE</div>
      <div class="tab" data-tab="device">B. Device Code</div>
    </div>

    <!-- ─────────────────────────────────────────────────────────────── -->
    <!-- FLUJO A: Auth Code + PKCE                                        -->
    <!-- ─────────────────────────────────────────────────────────────── -->
    <div class="tab-content active" id="tab-authcode">
      <div class="form-group">
        <label for="user">Usuario</label>
        <select id="user">
          <option value="ana">Ana García</option>
          <option value="luis">Luis Pérez</option>
          <option value="marta">Marta López</option>
        </select>
      </div>

      <label>Scopes que pide el agente</label>
      <div class="scopes">
        <label>
          <input type="checkbox" value="calendar.read" checked>
          <span>calendar.read</span>
          <span class="description"> — leer calendario</span>
        </label>
        <label>
          <input type="checkbox" value="calendar.write">
          <span>calendar.write</span>
          <span class="description"> — escribir calendario</span>
        </label>
        <label>
          <input type="checkbox" value="email.send">
          <span>email.send</span>
          <span class="description"> — enviar emails</span>
        </label>
        <label>
          <input type="checkbox" value="email.modify">
          <span>email.modify</span>
          <span class="description"> — gestionar correo</span>
        </label>
      </div>

      <div class="form-group">
        <label for="acr">Forzar MFA (acr_values)</label>
        <select id="acr">
          <option value="">No forzar</option>
          <option value="2">Forzar segundo factor (Keycloak)</option>
          <option value="c2">Forzar MFA (Azure B2C)</option>
        </select>
      </div>

      <button id="btn-authcode">Iniciar sesión con Auth Code + PKCE</button>

      <div class="alt-flow">
        <a href="#" id="btn-device-link">¿Sin UI disponible? Usa Device Code</a>
      </div>
    </div>

    <!-- ─────────────────────────────────────────────────────────────── -->
    <!-- FLUJO B: Device Code                                            -->
    <!-- ─────────────────────────────────────────────────────────────── -->
    <div class="tab-content" id="tab-device">
      <p style="color: #6b7889; font-size: 0.9em; margin-bottom: 20px;">
        Para agentes headless (CLI, server, CI/CD). El IdP te da un
        <code>user_code</code>; vas a tu dispositivo y lo introduces.
      </p>
      <div class="form-group">
        <label for="user2">Usuario</label>
        <select id="user2">
          <option value="ana">Ana García</option>
          <option value="luis">Luis Pérez</option>
          <option value="marta">Marta López</option>
        </select>
      </div>

      <div class="form-group">
        <label for="scope2">Scope</label>
        <input type="text" id="scope2" value="openid profile email calendar.read">
      </div>

      <button id="btn-device">Solicitar Device Code</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    // ─── Tabs ────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
    document.getElementById('btn-device-link').addEventListener('click', e => {
      e.preventDefault();
      document.querySelector('[data-tab="device"]').click();
    });

    // ─── Helpers ─────────────────────────────────────────────────────
    const STATUS = document.getElementById('status');
    const showStatus = (msg, type, data) => {
      STATUS.className = 'status show ' + type;
      STATUS.innerHTML = msg + (data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : '');
    };

    // ─── FLUJO A: Auth Code + PKCE ───────────────────────────────────
    document.getElementById('btn-authcode').addEventListener('click', async () => {
      const user = document.getElementById('user').value;
      const acr = document.getElementById('acr').value;
      const scopes = Array.from(document.querySelectorAll('.scopes input:checked'))
        .map(cb => cb.value);
      const scope = ['openid', 'profile', 'email', ...scopes].join(' ');

      showStatus('Iniciando Auth Code + PKCE...', 'ok');

      try {
        const resp = await fetch('/auth/authorize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: user,
            scope,
            acr_values: acr || null,
          }),
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error);

        // Guardamos la sesión en localStorage para la polling de callback
        localStorage.setItem(`pkce_${data.state}`, JSON.stringify({
          code_verifier: data.code_verifier,
          session_id: data.session_id,
        }));

        showStatus(
          `PKCE generado. Redirigiendo a ${data.authorize_url.slice(0, 80)}...`,
          'ok',
          { state: data.state, session_id: data.session_id }
        );

        // En producción: location.href = data.authorize_url
        // Para que el test funcione sin un browser que redirija, mostramos el link:
        STATUS.innerHTML += `<br><br><a href="${data.authorize_url}" target="_blank" 
          style="background: #0066cc; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; display: inline-block;">
          🌍 Ir al IdP ahora
        </a>`;
      } catch (e) {
        showStatus('❌ ' + e.message, 'err');
      }
    });

    // ─── FLUJO B: Device Code ────────────────────────────────────────
    document.getElementById('btn-device').addEventListener('click', async () => {
      const user = document.getElementById('user2').value;
      const scope = document.getElementById('scope2').value;

      showStatus('Pidiendo device_code al agente...', 'ok');

      try {
        const resp = await fetch('/auth/device', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: user, scope }),
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error);

        showStatus(
          `<strong>Tu código:</strong> <code style="font-size:1.3em">${data.user_code}</code><br>
           <strong>Ve a:</strong> <a href="${data.verification_uri}" target="_blank">${data.verification_uri}</a><br>
           <small>Expira en ${data.expires_in}s</small>`,
          'ok'
        );

        // Abrir página dédiée con countdown
        const deviceUrl = `/device?user_code=${encodeURIComponent(data.user_code)}&` +
                          `verification_uri=${encodeURIComponent(data.verification_uri)}&` +
                          `expires_in=${data.expires_in}`;
        window.open(deviceUrl, '_blank');
      } catch (e) {
        showStatus('❌ ' + e.message, 'err');
      }
    });

    // ─── Si volvimos del callback ─────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('auth') === 'ok') {
      const sid = params.get('session_id');
      showStatus(
        `✅ ¡Autenticado! Sesión: <code>${sid}</code>`,
        'ok'
      );
    } else if (params.get('error')) {
      showStatus(
        `❌ Error: ${params.get('error')}<br>${params.get('detail') || params.get('error_description')}`,
        'err'
      );
    }
  </script>
</body>
</html>
