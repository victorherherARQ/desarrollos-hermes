name: agent-oauth-poc

services:

  # ───────────────────────────────────────────────────────────────
  # PostgreSQL — backend de Keycloak
  # ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-poc-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agent-poc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ───────────────────────────────────────────────────────────────
  # Keycloak 26.6.4 — IdP con flujos A (Auth Code + PKCE) y B (Device Code)
  #               + soporte para C (Identity/JWT-Bearer) que KC 24 NO soportaba.
  # Migración 2026-07-08: KC 26 habilita `urn:ietf:params:oauth:grant-type:jwt-bearer`
  # por defecto y soporta custom claims en la assertion directamente.
  # ───────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: agent-poc-keycloak
    command: ["start-dev", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      # 8180 externo (8080 está ocupado por structurizr-c4-viewer en el host)
      - "8180:8080"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    networks:
      - agent-poc-net

  # ───────────────────────────────────────────────────────────────
  # realm-setup — idempotente: aplica el spec del realm (incluye
  # atributos dotted, scopes, asigna scopes a clientes vía sub-endpoint).
  # Solo se ejecuta una vez al hacer `docker compose up`; KC ya carga
  # el JSON al arrancar, pero el script lo re-aplica por si se cambia
  # el spec sin reiniciar KC.
  # ───────────────────────────────────────────────────────────────
  realm-setup:
    build:
      context: ./agent-python
    container_name: agent-poc-realm-setup
    command: ["python", "scripts/create_realm.py"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASS: admin
    depends_on:
      - keycloak
    networks:
      - agent-poc-net
    restart: "no"
    profiles: ["setup"]

  # ───────────────────────────────────────────────────────────────
  # Spring Boot API — recurso protegido (Resource Server)
  # ───────────────────────────────────────────────────────────────
  spring-boot-api:
    build:
      context: ./spring-boot-api
    container_name: agent-poc-spring-boot-api
    ports:
      - "9090:9090"
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/agent-poc
    depends_on:
      - keycloak
    networks:
      - agent-poc-net

  # ───────────────────────────────────────────────────────────────
  # Agent Python — cliente confidencial OIDC (flujos A + C + B)
  # ───────────────────────────────────────────────────────────────
  agent-python:
    build:
      context: ./agent-python
    container_name: agent-poc-agent-python
    ports:
      - "7000:7000"
    environment:
      IDP_ISSUER: http://keycloak:8080/realms/agent-poc
      AGENT_CLIENT_ID: agente-ia
      AGENT_CLIENT_SECRET: secret-del-agente
      API_BASE_URL: http://spring-boot-api:9090
      CLIENT_MOCK_REDIRECT_URI: http://client-mock:3000/auth/callback
      # RS256 signing key - si el PEM existe en el host, lo montamos.
      # Si no, config.py genera uno nuevo en este path DENTRO del contenedor
      # (no sobrevivira a `docker rm`, pero sirve para PoC rapido).
      AGENT_SIGNING_KEY_PATH: /var/run/agent/signing/rsa-priv.pem
      LOG_LEVEL: INFO
    volumes:
      # Keypair RSA persistente entre reinicios
      - agent-signing-key:/var/run/agent/signing:rw
    depends_on:
      - keycloak
    networks:
      - agent-poc-net

  # ───────────────────────────────────────────────────────────────
  # Client Mock — webapp Auth Code + PKCE (flujo A) + Device Code UI (B)
  # ───────────────────────────────────────────────────────────────
  client-mock:
    build:
      context: ./client-mock
    container_name: agent-poc-client-mock
    ports:
      - "3000:3000"
    environment:
      IDP_ISSUER: http://keycloak:8080/realms/agent-poc
      AGENT_CLIENT_ID: agente-ia
      AGENT_CLIENT_SECRET: secret-del-agente
      AGENT_URL: http://agent-python:7000
    depends_on:
      - agent-python
    networks:
      - agent-poc-net

# ───────────────────────────────────────────────────────────────
# Redes
# ───────────────────────────────────────────────────────────────
networks:
  agent-poc-net:
    name: agent-poc-net
    driver: bridge

# ───────────────────────────────────────────────────────────────
# Volúmenes
# ───────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: agent-poc-postgres-data
  agent-signing-key:
    name: agent-poc-agent-signing-key
